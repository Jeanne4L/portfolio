<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
            <meta http-equiv="X-UA-Compatible" content="IE=edge">

        <title>Sandra Petereau - Leslie Fessel</title>
        <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">

    </head>

    <body>
        <header>
            <div class="container">
                <a href="index.html" aria-label="retourner sur la page principale">
                    <img src="images/logo.webp" alt="logo avec les lettres s et p" srcset="images/logo.svg">
                </a>
            </div>
        </header>

        <section class="about" id="top">

                    <h2>Site vitrine sur la psychomotricité</h2>

                    <div class="btn--arrow">
                        <a href="https://github.com/Jeanne4L/leslie-fessel" role="button">

                        </a>
                        <div class="arrow">
                            <div class="line"></div>
                            <div class="chevron"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        
        <section class="photos">
            <h2>Photos</h2>

            <div class="container">
                <a href="images/projects/leslie/leslie__img1.webp" class="website-grid__first">

                <a href="images/projects/leslie/leslie__img2.webp" class="website-grid__second">

                <a href="images/projects/leslie/leslie__img3.webp" class="leslie-grid__third">

                </a>
                <a href="images/projects/leslie/leslie__img4.webp" class="leslie-grid__fourth">
                    <img src="images/projects/leslie/leslie__img4.webp" alt="Informations de contact de Leslie Fessel" class="project__img">
                </a>
            </div>

        <a href="#top" class="anchor-link" aria-label="retour haut de page" role="button">
            <i class="anchor-up hidden"></i>
        </a>

        <footer>
            <nav>
                <ul>
                    <li>
                        <a href="https://github.com/Jeanne4L" target="_blank" aria-label="lien github">

                    </li>
                    <li>
                        <a href="mailto:sandra.petereau@outlook.fr" aria-label="lien envoi email">
