        <section id="contact">
            <div class="container">
                <h2>Contactez-moi</h2>
                
                <form action="php/form-res.php" method="post">
                    <label for="name">Nom *</label>
                    <input type="text" id="name" name="name" aria-required="true" required>
                    <p id="name__error" class="error hidden">
                        Ce champs ne doit contenir que des lettres
                    </p> 
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" aria-required="true" required> 
                    <p id="email__error" class="error hidden">
                        Email invalide
                    </p>
                    <label for="message">Message *</label>
                    <textarea cols="30" rows="10" id="message" name="message" aria-required="true" required></textarea> 

                    <label for="check-number">3 + 4 ? *</label>
                    <input type="number" id="check-number" name="check-number" aria-required="true" required> 
                    <input type="hidden" id="check">

                    <input type="submit" value="envoyer" class="btn">
                </form>
            </div>
