<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
            <meta http-equiv="X-UA-Compatible" content="IE=edge">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <meta name="description" content="Pour ma reconversion comme développeuse web, j'ai réalisé ce projet scolaire du site Kanap.">

        <title>Sandra Petereau - Kanap</title>
        <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">

        <link rel="stylesheet" href="style.min.css">
        <script src="script.min.js" async></script>
    </head>

    <body>
        <header>
            <div class="container">
                <a href="index.html" aria-label="retourner sur la page principale">
                    <img src="images/logo.webp" alt="logo avec les lettres s et p" srcset="images/logo.svg">
                </a>
            </div>
        </header>

        <section class="about" id="top">
            <div class="container">
                <img src="images/projects/kanap/logo.avif" alt="logo du site Kanap" class="center-img">

                <div class="presentation">
                    <h1>Kanap</h1>
                    <h2>Site de vente en ligne de canapés</h2>

                    <div class="btn--arrow">
                        <a href="https://github.com/Jeanne4L/oc-kanap" role="button">
                            voir le code
                        </a>
                        <div class="arrow">
                            <div class="line"></div>
                            <div class="chevron"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        
        <section class="photos">
            <h2>Photos</h2>
            <div class="container">
                <a href="images/projects/kanap__img.webp" class="website-grid__first">
                    <img src="images/projects/kanap__img.webp" alt="image du site Kanap" class="project__img" loading="lazy">
                </a>
                <a href="images/projects/kanap/kanap__img2.webp" class="website-grid__second">
                    <img src="images/projects/kanap/kanap__img2.webp" alt="Site Kanap sur un écran de mobile" class="project__img" loading="lazy">
                </a>
                <a href="images/projects/kanap/kanap__img3.webp" class="kanap-grid__third">
                    <img src="images/projects/kanap/kanap__img3.webp" alt="Produits disponibles sur le site Kanap" class="project__img" loading="lazy">
                </a>
                <a href="images/projects/kanap/kanap__img4.webp" class="kanap-grid__fourth">
                    <img src="images/projects/kanap/kanap__img4.webp" alt="Page détaillée d'un produit du site Kanap" class="project__img" loading="lazy">
                </a>
                <a href="images/projects/kanap/kanap__img5.webp" class="kanap-grid__fifth">
                    <img src="images/projects/kanap/kanap__img5.webp" alt="Page panier du site Kanap" class="project__img" loading="lazy">
                </a>
            </div>
        </section>
        
        <a href="#top" class="anchor-link" aria-label="retour haut de page" role="button">
            <i class="anchor-up hidden"></i>
        </a>

        <footer>
            <nav>
                <ul>
                    <li>
                        <a href="https://github.com/Jeanne4L" target="_blank" aria-label="lien github">
                            github
                            <div class="underline"></div>
                        </a>
                    </li>
                    <li>
                        <a href="mailto:sandra.petereau@outlook.fr" aria-label="lien envoi email">
                            email
                            <div class="underline"></div>
                        </a>
                    </li>
                </ul>
            </nav>
        </footer>
    </body>
</html>
